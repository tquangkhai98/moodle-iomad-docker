name: Build and Push Docker Images

on:
  # Manual trigger with version selection
  workflow_dispatch:
    inputs:
      versions:
        description: 'Versions to build (comma-separated: 5.0,4.5,4.4 or "all")'
        required: true
        default: 'all'

  # Auto-trigger on version tags
  push:
    tags:
      - 'v*'

  # Weekly rebuild (Monday 6:00 UTC) to pick up base image updates
  schedule:
    - cron: '0 6 * * 1'

env:
  DOCKER_HUB_USER: tquangkhai98
  IMAGE_NAME: moodle-iomad

jobs:
  # ─────────────────────────────────────────────
  # Prepare build matrix
  # ─────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        run: |
          # Full version matrix
          ALL_VERSIONS='[
            {"moodle":"5.0","moodle_code":"500","iomad_branch":"IOMAD_500_STABLE","php":"8.4","php_suffix":"-php8.4","latest":false},
            {"moodle":"5.0","moodle_code":"500","iomad_branch":"IOMAD_500_STABLE","php":"8.3","php_suffix":"","latest":false},
            {"moodle":"4.5","moodle_code":"405","iomad_branch":"IOMAD_405_STABLE","php":"8.3","php_suffix":"","latest":true},
            {"moodle":"4.4","moodle_code":"404","iomad_branch":"IOMAD_404_STABLE","php":"8.3","php_suffix":"","latest":false}
          ]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.versions }}"
            if [ "$INPUT" = "all" ]; then
              MATRIX="$ALL_VERSIONS"
            else
              # Filter matrix by selected versions
              MATRIX=$(echo "$ALL_VERSIONS" | jq -c --arg versions "$INPUT" '
                [.[] | select(.moodle as $m | $versions | split(",") | map(gsub("\\s";"")) | index($m))]
              ')
            fi
          else
            # Tags, schedule → build all
            MATRIX="$ALL_VERSIONS"
          fi

          echo "matrix=$(echo $MATRIX | jq -c '{"include": .}')" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # Build and push images (matrix)
  # ─────────────────────────────────────────────
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          DOCKERHUB="${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}"
          GHCR="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          SUFFIX="${{ matrix.php_suffix }}"

          TAGS="${DOCKERHUB}:${{ matrix.moodle }}${SUFFIX}"
          TAGS="${TAGS},${GHCR}:${{ matrix.moodle }}${SUFFIX}"

          # Add :latest tag only for the designated latest version
          if [ "${{ matrix.latest }}" = "true" ]; then
            TAGS="${TAGS},${DOCKERHUB}:latest,${GHCR}:latest"
          fi

          # Add version tag from git tag (e.g., v4.5.1 → 4.5.1)
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${TAGS},${DOCKERHUB}:${TAG_VERSION}${SUFFIX},${GHCR}:${TAG_VERSION}${SUFFIX}"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            MOODLE_VERSION=${{ matrix.moodle_code }}
            IOMAD_BRANCH=${{ matrix.iomad_branch }}
            PHP_VERSION=${{ matrix.php }}
          cache-from: type=gha,scope=moodle-${{ matrix.moodle }}-php${{ matrix.php }}
          cache-to: type=gha,scope=moodle-${{ matrix.moodle }}-php${{ matrix.php }},mode=max
          labels: |
            org.opencontainers.image.title=Moodle ${{ matrix.moodle }} + IOMAD
            org.opencontainers.image.description=Moodle ${{ matrix.moodle }} with IOMAD multi-tenancy plugin
            org.opencontainers.image.version=${{ matrix.moodle }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Summary
        run: |
          echo "## 🐳 Moodle ${{ matrix.moodle }} + IOMAD" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Moodle | \`${{ matrix.moodle }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| IOMAD | \`${{ matrix.iomad_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| PHP | \`${{ matrix.php }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | \`linux/amd64\`, \`linux/arm64\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ matrix.moodle }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# GitHub Packages" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ matrix.moodle }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
